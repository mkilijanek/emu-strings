name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    services:
      mongo:
        image: mongo:5.0
        ports:
          - 27017:27017
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: ./src
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      working-directory: ./src
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      working-directory: ./src
      run: |
        black --check --diff .

    - name: Test with pytest
      working-directory: ./src
      env:
        MONGODB_URL: mongodb://localhost:27017/
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest ../tests/ --cov=. --cov-report=xml --cov-report=term -v || true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.ref == 'refs/heads/master'

    - name: Build and push app image
      uses: docker/build-push-action@v5
      with:
        context: ./src
        file: ./src/Dockerfile-app
        push: ${{ github.ref == 'refs/heads/master' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/emu-strings:latest
          ${{ secrets.DOCKER_USERNAME }}/emu-strings:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push daemon image
      uses: docker/build-push-action@v5
      with:
        context: ./src
        file: ./src/Dockerfile-daemon
        push: ${{ github.ref == 'refs/heads/master' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/emu-strings-daemon:latest
          ${{ secrets.DOCKER_USERNAME }}/emu-strings-daemon:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
