version: "3.7"
services:
  emu-app:
    image: "psrok1/emu-strings:${TAG:-latest}"
    build:
      context: ./src
      dockerfile: Dockerfile-app
    links:
      - mongo
      - redis
    environment:
      STATIC_PATH: /app/build/static
    ports:
      - "64205:80"
    volumes:
      - type: volume
        source: results
        target: /app/results
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  emu-daemon:
    image: "psrok1/emu-strings-daemon:${TAG:-latest}"
    build:
      context: ./src
      dockerfile: Dockerfile-daemon
    links:
      - dind
      - mongo
      - redis
    environment:
      DOCKER_HOST: tcp://dind:2375
      TAG: "${TAG:-latest}"
      CONCURRENCY: "${CONCURRENCY:-4}"
      ENABLE_BOXJS: "${ENABLE_BOXJS:-}"
    volumes:
      - type: bind
        source: ./emulators/images
        target: /app/images
      - type: volume
        source: results
        target: /app/results
  mongo:
    image: mongo
    volumes:
      - type: volume
        source: mongodb
        target: /data/db
    healthcheck:
      test: echo 'db.runCommand({serverStatus: 1}).ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  redis:
    image: redis:alpine
  dind:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - type: volume
        source: results
        target: /app/results
      - type: tmpfs
        target: /var/lib/docker
volumes:
  mongodb:
  results: